version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: olist-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: olist_ecommerce
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    container_name: olist-app
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=
      - DB_NAME=olist_ecommerce
      - PYTHONIOENCODING=utf-8
    volumes:
      - ./data/processed:/app/data/processed
      - ./logs:/app/logs
      - ./models:/app/models
    deploy:
      resources:
        limits:
          memory: 4g
    # CMD 由 Dockerfile 指定（/entrypoint.sh）

volumes:
  mysql_data:
